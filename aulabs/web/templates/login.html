<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }} — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/panel.css" />
</head>
<body class="login-body">
  <div class="login-atmosphere" aria-hidden="true"></div>
  <main class="login-stage">
    <header class="login-brand">
      <p class="brand-mark">AU Labs</p>
      <h1 class="brand-title">IT Management</h1>
      <p class="brand-sub">Local Linux hosting panel — users, storage, sessions, and OS control on one host.</p>
    </header>
    <form id="login-form" class="login-form" autocomplete="on">
      <label>
        <span>Username</span>
        <input type="text" name="username" required autofocus value="admin" />
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" required value="aulabs-admin" />
      </label>
      <p id="login-error" class="form-error" hidden></p>
      <button type="submit" class="btn primary">Enter panel</button>
    </form>
    <p class="login-meta">v{{ version }} · localhost only · Linux</p>
  </main>
  <script src="/static/js/login.js"></script>
</body>
</html>
